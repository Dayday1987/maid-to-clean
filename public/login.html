<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your Maid To Clean customer or admin account." />
  <title>Login | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="auth-container">
    <h1>Welcome Back</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div style="text-align:right;margin-top:0.5rem"><a href="/forgot-password.html" class="forgot-link">Forgot password?</a></div>
    <div class="auth-link">Don't have an account? <a href="/register.html">Create one</a></div>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="/assets/js/load-navbar.js"></script>
</body>
</html>
