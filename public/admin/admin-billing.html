<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing | Maid To Clean Admin</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/navbar.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body>

  <div id="navbar"></div>

  <main class="admin-container">
    <div class="admin-header">
      <h1>Billing & Revenue</h1>
      <a href="/admin/admin-dashboard.html" class="btn btn-secondary btn-sm">
        <i class="ph-duotone ph-arrow-left"></i> Back to Dashboard
      </a>
    </div>

    <!-- Revenue Stats -->
    <div class="admin-stats-grid">
      <div class="admin-stat-card">
        <h4>Total Revenue</h4>
        <div class="value" id="totalRevenue">$0</div>
      </div>
      <div class="admin-stat-card">
        <h4>This Month</h4>
        <div class="value" id="monthRevenue">$0</div>
      </div>
      <div class="admin-stat-card">
        <h4>Pending Payments</h4>
        <div class="value" id="pendingPayments">$0</div>
      </div>
      <div class="admin-stat-card">
        <h4>Total Transactions</h4>
        <div class="value" id="totalTransactions">0</div>
      </div>
    </div>

    <!-- Payment History -->
    <div class="admin-card">
      <div class="admin-card-header">
        <h3><i class="ph-duotone ph-receipt"></i> Payment History</h3>
        <select id="paymentFilter" style="padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm);">
          <option value="">All Payments</option>
          <option value="paid">Completed</option>
          <option value="pending">Pending</option>
        </select>
      </div>
      <div class="admin-card-body">
        <div id="paymentList" style="overflow-x: auto;">
          <div class="empty-state">
            <i class="ph-duotone ph-receipt"></i>
            <p>Loading payments...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Customer Billing Summary -->
    <div class="admin-card mt-6">
      <div class="admin-card-header">
        <h3><i class="ph-duotone ph-users"></i> Customer Billing Summary</h3>
      </div>
      <div class="admin-card-body">
        <div id="customerBilling" style="overflow-x: auto;">
          <div class="empty-state">
            <i class="ph-duotone ph-chart-bar"></i>
            <p>Loading billing data...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    let allPayments = [];

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="ph-duotone ph-${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadBillingData();

      document.getElementById('paymentFilter').addEventListener('change', (e) => {
        const status = e.target.value;
        const filtered = status 
          ? allPayments.filter(p => p.status === status)
          : allPayments;
        renderPayments(filtered);
      });
    });

    async function loadBillingData() {
      try {
        // Get all payments
        const { data: payments, error } = await supabase
          .from('payments')
          .select(`
            *,
            users (email, full_name),
            appointments (
              appointment_date,
              services (name)
            )
          `)
          .order('created_at', { ascending: false });

        if (error) throw error;

        allPayments = payments || [];

        // Calculate stats
        const paidPayments = allPayments.filter(p => p.status === 'paid');
        const pendingPayments = allPayments.filter(p => p.status === 'pending');

        const totalRevenue = paidPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
        const pendingAmount = pendingPayments.reduce((sum, p) => sum + (p.amount || 0), 0);

        document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
        document.getElementById('pendingPayments').textContent = `$${pendingAmount.toFixed(2)}`;
        document.getElementById('totalTransactions').textContent = paidPayments.length;

        // This month's revenue
        const thisMonth = new Date();
        const monthStart = new Date(thisMonth.getFullYear(), thisMonth.getMonth(), 1).toISOString();
        const monthPayments = paidPayments.filter(p => p.created_at >= monthStart);
        const monthRevenue = monthPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
        document.getElementById('monthRevenue').textContent = `$${monthRevenue.toFixed(2)}`;

        renderPayments(allPayments);
        await loadCustomerBilling();

      } catch (error) {
        console.error('Error loading billing data:', error);
        showToast('Failed to load billing data', 'error');
      }
    }

    function renderPayments(payments) {
      const container = document.getElementById('paymentList');

      if (!payments || payments.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="ph-duotone ph-receipt"></i>
            <p>No payments found</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Stripe ID</th>
            </tr>
          </thead>
          <tbody>
            ${payments.map(payment => `
              <tr>
                <td>${new Date(payment.created_at).toLocaleDateString()}</td>
                <td>
                  <div>
                    <p style="font-weight: 500;">${payment.users?.full_name || 'Unknown'}</p>
                    <small style="color: var(--secondary);">${payment.users?.email || ''}</small>
                  </div>
                </td>
                <td>${payment.appointments?.services?.name || 'Cleaning'}</td>
                <td style="font-weight: 600;">$${payment.amount?.toFixed(2) || '0.00'}</td>
                <td><span class="status-badge ${payment.status}">${payment.status}</span></td>
                <td style="font-size: 0.75rem; color: var(--secondary);">${payment.stripe_session_id ? payment.stripe_session_id.substring(0, 15) + '...' : '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadCustomerBilling() {
      try {
        // Get customer payment summaries
        const { data: customers } = await supabase
          .from('users')
          .select('id, email, full_name')
          .eq('role', 'customer');

        if (!customers) return;

        // Calculate totals for each customer
        const customerSummaries = await Promise.all(customers.map(async (customer) => {
          const { data: payments } = await supabase
            .from('payments')
            .select('amount, status')
            .eq('user_id', customer.id);

          const paid = payments?.filter(p => p.status === 'paid').reduce((sum, p) => sum + (p.amount || 0), 0) || 0;
          const pending = payments?.filter(p => p.status === 'pending').reduce((sum, p) => sum + (p.amount || 0), 0) || 0;

          return {
            ...customer,
            totalPaid: paid,
            pending: pending
          };
        }));

        // Sort by total paid (descending)
        customerSummaries.sort((a, b) => b.totalPaid - a.totalPaid);

        const container = document.getElementById('customerBilling');

        if (customerSummaries.length === 0) {
          return;
        }

        container.innerHTML = `
          <table class="admin-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Total Paid</th>
                <th>Pending</th>
              </tr>
            </thead>
            <tbody>
              ${customerSummaries.map(customer => `
                <tr>
                  <td>
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                      <div class="customer-avatar">${(customer.full_name || customer.email || 'U').charAt(0).toUpperCase()}</div>
                      <div>
                        <p style="font-weight: 500;">${customer.full_name || 'No name'}</p>
                        <small style="color: var(--secondary);">${customer.email}</small>
                      </div>
                    </div>
                  </td>
                  <td style="font-weight: 600; color: var(--success);">$${customer.totalPaid.toFixed(2)}</td>
                  <td style="color: ${customer.pending > 0 ? '#D97706' : 'var(--secondary)'};">$${customer.pending.toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

      } catch (error) {
        console.error('Error loading customer billing:', error);
      }
    }
  </script>

</body>
</html>
