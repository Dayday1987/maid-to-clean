<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin dashboard for Maid To Clean - manage bookings, customers, and payments." />
  <title>Admin Dashboard | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Admin Dashboard</h1>
      <p>Overview of all bookings and business activity</p>
    </div>

    <div class="grid grid-3">
      <!-- Cards for quick stats - you can expand later -->
      <div class="dashboard-card text-center">
        <h3>Pending Bookings</h3>
        <div id="pendingCount" style="font-size:3rem;font-weight:700;color:var(--accent);">0</div>
      </div>
      <div class="dashboard-card text-center">
        <h3>Today’s Cleanings</h3>
        <div id="todayCount" style="font-size:3rem;font-weight:700;color:var(--accent);">0</div>
      </div>
      <div class="dashboard-card text-center">
        <h3>Total Revenue</h3>
        <div id="revenue" style="font-size:3rem;font-weight:700;color:var(--accent);">$0</div>
      </div>
    </div>

    <div class="dashboard-card" style="margin-top:2rem;">
      <h3>Recent Bookings</h3>
      <div id="recentBookings"></div>
    </div>
  </main>

  <div id="footer"></div>

  <script defer src="/assets/js/load-footer.js"></script>
  <script src="/assets/js/load-navbar.js"></script>
</body>
</html>
