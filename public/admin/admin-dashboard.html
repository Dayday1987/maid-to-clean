<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/navbar.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body>

  <div id="navbar"></div>

  <main class="admin-container">
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <a href="/admin/admin-customers.html" class="btn btn-secondary btn-sm">
        <i class="ph-duotone ph-users"></i> View Customers
      </a>
    </div>

    <!-- Stats Grid -->
    <div class="admin-stats-grid">
      <div class="admin-stat-card">
        <h4>Total Customers</h4>
        <div class="value" id="totalCustomers">0</div>
      </div>
      <div class="admin-stat-card">
        <h4>Pending Bookings</h4>
        <div class="value" id="pendingBookings">0</div>
      </div>
      <div class="admin-stat-card">
        <h4>This Month Revenue</h4>
        <div class="value" id="monthRevenue">$0</div>
      </div>
      <div class="admin-stat-card">
        <h4>Total Revenue</h4>
        <div class="value" id="totalRevenue">$0</div>
      </div>
    </div>

    <!-- Recent Bookings -->
    <div class="admin-card">
      <div class="admin-card-header">
        <h3><i class="ph-duotone ph-calendar-check"></i> Recent Booking Requests</h3>
        <a href="/admin/admin-customers.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div class="admin-card-body">
        <div id="recentBookings" style="overflow-x: auto;">
          <div class="empty-state">
            <i class="ph-duotone ph-calendar-blank"></i>
            <p>No pending bookings</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
      <div class="admin-card">
        <div class="admin-card-header">
          <h3><i class="ph-duotone ph-lightning"></i> Quick Actions</h3>
        </div>
        <div class="admin-card-body">
          <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <a href="/admin/admin-customers.html" class="btn btn-secondary">
              <i class="ph-duotone ph-users"></i> Manage Customers
            </a>
            <a href="/admin/admin-messages.html" class="btn btn-secondary">
              <i class="ph-duotone ph-envelope"></i> Send Message
            </a>
            <a href="/admin/admin-billing.html" class="btn btn-secondary">
              <i class="ph-duotone ph-chart-line-up"></i> View Billing
            </a>
          </div>
        </div>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h3><i class="ph-duotone ph-megaphone"></i> Broadcast Message</h3>
        </div>
        <div class="admin-card-body">
          <form id="broadcastForm">
            <div class="form-group">
              <textarea id="broadcastMessage" placeholder="Type a message to send to all customers..." style="min-height: 100px;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full" data-testid="send-broadcast-btn">
              <i class="ph-duotone ph-paper-plane-tilt"></i> Send to All
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="ph-duotone ph-${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadAdminDashboard();
    });

    async function loadAdminDashboard() {
      try {
        // Get total customers
        const { count: customerCount } = await supabase
          .from('users')
          .select('*', { count: 'exact', head: true })
          .eq('role', 'customer');

        document.getElementById('totalCustomers').textContent = customerCount || 0;

        // Get pending bookings
        const { data: pendingBookings, count: pendingCount } = await supabase
          .from('appointments')
          .select(`
            *,
            users (email, full_name),
            services (name)
          `, { count: 'exact' })
          .eq('status', 'pending')
          .order('created_at', { ascending: false });

        document.getElementById('pendingBookings').textContent = pendingCount || 0;

        // Show recent bookings
        if (pendingBookings && pendingBookings.length > 0) {
          document.getElementById('recentBookings').innerHTML = `
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Customer</th>
                  <th>Service</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${pendingBookings.slice(0, 5).map(booking => `
                  <tr>
                    <td>
                      <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="customer-avatar">${(booking.users?.full_name || booking.users?.email || 'U').charAt(0).toUpperCase()}</div>
                        <div>
                          <p style="font-weight: 500;">${booking.users?.full_name || 'Unknown'}</p>
                          <small style="color: var(--secondary);">${booking.users?.email || ''}</small>
                        </div>
                      </div>
                    </td>
                    <td>${booking.services?.name || 'Cleaning'}</td>
                    <td>${new Date(booking.appointment_date).toLocaleDateString()}</td>
                    <td><span class="status-badge pending">${booking.status}</span></td>
                    <td>
                      <button class="action-btn view" onclick="approveBooking('${booking.id}')" data-testid="approve-btn-${booking.id}">
                        <i class="ph-duotone ph-check"></i> Approve
                      </button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }

        // Get payments
        const { data: payments } = await supabase
          .from('payments')
          .select('amount, created_at')
          .eq('status', 'paid');

        if (payments) {
          const totalRevenue = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
          document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;

          // This month's revenue
          const thisMonth = new Date();
          const monthStart = new Date(thisMonth.getFullYear(), thisMonth.getMonth(), 1).toISOString();
          const monthPayments = payments.filter(p => p.created_at >= monthStart);
          const monthRevenue = monthPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
          document.getElementById('monthRevenue').textContent = `$${monthRevenue.toFixed(2)}`;
        }

      } catch (error) {
        console.error('Error loading dashboard:', error);
        showToast('Failed to load dashboard data', 'error');
      }
    }

    async function approveBooking(bookingId) {
      try {
        // Get the booking details with user and service info
        const { data: booking } = await supabase
          .from('appointments')
          .select('*, services (name, base_price), users (email, full_name)')
          .eq('id', bookingId)
          .single();

        if (!booking) throw new Error('Booking not found');

        // Calculate quoted price (base price for now, can add add-ons later)
        const quotedPrice = booking.services?.base_price || 100;

        // Update appointment status
        const { error } = await supabase
          .from('appointments')
          .update({ 
            status: 'approved',
            quoted_price: quotedPrice
          })
          .eq('id', bookingId);

        if (error) throw error;

        // Send approval email to customer
        try {
          await fetch('/api/notify-booking', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customerEmail: booking.users?.email,
              customerName: booking.users?.full_name || '',
              serviceName: booking.services?.name || 'Cleaning Service',
              appointmentDate: new Date(booking.appointment_date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }),
              appointmentTime: booking.appointment_time,
              type: 'approved'
            })
          });
        } catch (emailErr) {
          console.error('Approval email failed:', emailErr);
        }

        showToast('Booking approved! Customer can now pay.', 'success');
        await loadAdminDashboard();
      } catch (error) {
        console.error('Error approving booking:', error);
        showToast('Failed to approve booking', 'error');
      }
    }

    // Broadcast message
    document.getElementById('broadcastForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const message = document.getElementById('broadcastMessage').value.trim();
      if (!message) {
        showToast('Please enter a message', 'error');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Sending...';

      try {
        const admin = await getCurrentUser();
        
        // Get all customers
        const { data: customers } = await supabase
          .from('users')
          .select('id')
          .eq('role', 'customer');

        if (customers && customers.length > 0) {
          // Insert message for each customer
          const messages = customers.map(c => ({
            sender_id: admin.id,
            receiver_id: c.id,
            content: message
          }));

          const { error } = await supabase.from('messages').insert(messages);
          if (error) throw error;

          showToast(`Message sent to ${customers.length} customers!`, 'success');
          document.getElementById('broadcastMessage').value = '';
        } else {
          showToast('No customers to send message to', 'info');
        }
      } catch (error) {
        console.error('Error sending broadcast:', error);
        showToast('Failed to send message', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ph-duotone ph-paper-plane-tilt"></i> Send to All';
      }
    });
  </script>

  <style>
    @media (max-width: 900px) {
      .admin-container > div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

</body>
</html>
