<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your Maid To Clean account to book professional cleaning services in Montgomery AL." />
  <meta name="keywords" content="register maid to clean, create account cleaning service Montgomery AL" />
  <meta property="og:title" content="Register | Maid To Clean" />
  <title>Register | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="auth-container">
    <h1>Create Account</h1>

    <form id="registerForm">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" required />
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    function showToast(message, type = "info") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="ph-duotone ph-${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;

      try {
        await registerUser(email, password, firstName, lastName, phone);
        showToast("Account created! Check your email to confirm.", "success");
        setTimeout(() => window.location.href = `/confirm-email.html?email=${encodeURIComponent(email)}`, 1500);
      } catch (error) {
        showToast(error.message || "Registration failed", "error");
      }
    });
  </script>

  <script src="/assets/js/load-navbar.js"></script>
</body>
</html>
