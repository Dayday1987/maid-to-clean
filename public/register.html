<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Maid To Clean | Montgomery AL</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/navbar.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body>

  <div id="navbar"></div>

  <main class="auth-container">
    <h1>Create Account</h1>
    
    <form id="registerForm">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label for="registerFirstName">First Name</label>
          <input type="text" id="registerFirstName" placeholder="Jane" required data-testid="register-firstname-input">
        </div>
        <div class="form-group">
          <label for="registerLastName">Last Name</label>
          <input type="text" id="registerLastName" placeholder="Doe" required data-testid="register-lastname-input">
        </div>
      </div>
      <div class="form-group">
        <label for="registerEmail">Email Address</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" required data-testid="register-email-input">
      </div>
      <div class="form-group">
        <label for="registerPhone">Phone Number</label>
        <input type="tel" id="registerPhone" placeholder="(334) 123-4567" data-testid="register-phone-input">
      </div>
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="Create a password (min. 6 characters)" required minlength="6" data-testid="register-password-input">
      </div>
      <button type="submit" class="btn btn-primary" data-testid="register-submit-btn">
        <i class="ph-duotone ph-user-plus"></i>
        Create Account
      </button>
    </form>
    
    <div class="auth-link">
      Already have an account? <a href="/login.html">Login</a>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="ph-duotone ph-${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const firstName = document.getElementById('registerFirstName').value.trim();
      const lastName  = document.getElementById('registerLastName').value.trim();
      const email     = document.getElementById('registerEmail').value.trim();
      const phone     = document.getElementById('registerPhone').value.trim();
      const password  = document.getElementById('registerPassword').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Creating account...';
      
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              // Store as full_name in auth metadata so the DB trigger
              // can split it into first_name / last_name
              full_name: `${firstName} ${lastName}`.trim(),
              phone
            }
          }
        });

        if (error) throw error;

        // Note: the public.users row is created automatically by a
        // Supabase database trigger (handle_new_user) so no manual
        // insert is needed here.

        // Redirect to confirmation page — passes email so it can display
        // it and offer a resend button
        window.location.href = `/confirm-email.html?email=${encodeURIComponent(email)}`;

      } catch (error) {
        showToast(error.message || 'Registration failed. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ph-duotone ph-user-plus"></i> Create Account';
      }
    });
  </script>

</body>
</html>
