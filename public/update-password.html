<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Update your Maid To Clean password after resetting it." />
  <title>Update Password | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
</head>
<body class="light-bg">
  <main class="auth-container">
    <h1>Update Password</h1>

    <form id="updateForm">
      <input type="password" id="newPassword" placeholder="New password" required />
      <button type="submit" class="btn btn-primary">Update Password</button>
    </form>

    <p id="message" style="margin-top:1rem"></p>
  </main>

  <script>
    const form = document.getElementById("updateForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById("newPassword").value;

      const { error } = await supabase.auth.updateUser({ password: newPassword });

      if (error) {
        message.textContent = error.message;
        message.style.color = "var(--error)";
      } else {
        message.textContent = "Password updated successfully! You can now log in.";
        message.style.color = "var(--success)";
        setTimeout(() => window.location.href = "/login.html", 2000);
      }
    });
  </script>

  <script src="/assets/js/load-navbar.js"></script>
</body>
</html>
