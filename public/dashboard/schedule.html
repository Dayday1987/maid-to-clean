<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Schedule Cleaning</h1>
      <p>Book your next cleaning service</p>
    </div>

    <div class="schedule-grid">
      <!-- Booking Form -->
      <div class="schedule-form">
        <form id="scheduleForm">
          <!-- All your form fields stay exactly the same -->
          <div class="form-group">
            <label for="serviceSelect">Select Service</label>
            <select id="serviceSelect" required></select>
          </div>

          <div class="form-group">
            <label>Choose a Date</label>
            <div id="calendar" style="max-width:100%; margin-bottom:1rem;"></div>
            <input type="hidden" id="selectedDate" required />
            <p id="selectedDateDisplay" style="font-weight:600;color:var(--accent);margin-top:0.25rem;"></p>
          </div>

          <div class="form-group">
            <label for="timeSlots">Available Time Slots</label>
            <select id="timeSlots" required></select>
          </div>

          <!-- rooms, squareFootage, addonSelect, customOptions, notes — all your original fields go here (unchanged) -->

          <button type="submit" class="btn btn-primary w-full">
            <i class="ph-duotone ph-paper-plane-tilt"></i> Submit Booking Request
          </button>
        </form>
      </div>

      <!-- Past Appointments -->
      <div class="dashboard-card">
        <h3><i class="ph-duotone ph-clock-counter-clockwise"></i> Your Appointments</h3>
        <div id="appointmentHistory">
          <div class="empty-state">
            <i class="ph-duotone ph-calendar-blank"></i>
            <p>No appointments yet</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>

  </script>

  <style>
    .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 900px) { .schedule-grid { grid-template-columns: 1fr !important; } }
  </style>
</body>
</html>
