<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Cleaning | <!-- BUSINESS_NAME --></title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"
    ></script>
    <script defer src="/assets/js/api-config.js"></script>
    <script defer src="/assets/js/auth.js"></script>
    <script defer src="/assets/js/dashboard-protect.js"></script>
    <script defer src="/assets/js/main.js"></script>
  </head>

  <body>
    <div id="navbar"></div>

    <main class="dashboard-container">
      <h1>Schedule Residential Cleaning</h1>

      <form id="scheduleForm" class="schedule-form">
        <!-- Step 1: Service Selection -->
        <label for="serviceSelect">Select Service</label>
        <select id="serviceSelect" required></select>

        <!-- Step 2: Rooms / Tier -->
        <label for="roomsSelect">Number of Rooms</label>
        <select id="roomsSelect" required>
          <option value="1">1–2 Rooms</option>
          <option value="2">3–4 Rooms</option>
          <option value="3">5–6 Rooms</option>
          <option value="4">7–8 Rooms</option>
          <option value="5">9+ Rooms</option>
        </select>

        <!-- Step 3: Square Footage (optional for admin reference) -->
        <label for="squareFootage">Square Footage (optional)</label>
        <input type="number" id="squareFootage" min="0" />

        <!-- Step 4: Add-Ons -->
        <label for="addonSelect">Add-Ons</label>
        <select id="addonSelect" multiple></select>

        <!-- Step 5: Custom Cleaning Options (visible if service = Custom Cleaning) -->
        <div
          id="customOptions"
          style="
            display: none;
            border: 1px solid #ccc;
            padding: 1rem;
            margin-bottom: 1rem;
          "
        >
          <h3>Custom Cleaning Checklist</h3>

          <fieldset>
            <legend>Rooms</legend>
            <label
              ><input type="checkbox" name="rooms" value="bedroom" />
              Bedroom</label
            >
            <label
              ><input type="checkbox" name="rooms" value="bathroom" />
              Bathroom</label
            >
            <label
              ><input type="checkbox" name="rooms" value="kitchen" />
              Kitchen</label
            >
            <label
              ><input type="checkbox" name="rooms" value="living_room" /> Living
              Room</label
            >
            <label
              ><input type="checkbox" name="rooms" value="office" />
              Office</label
            >
            <label
              ><input type="checkbox" name="rooms" value="basement" />
              Basement</label
            >
          </fieldset>

          <fieldset>
            <legend>Appliances</legend>
            <label
              ><input type="checkbox" id="allAppliances" value="all" /> All
              Appliances</label
            >
            <label
              ><input type="checkbox" name="appliances" value="fridge" />
              Fridge</label
            >
            <label
              ><input type="checkbox" name="appliances" value="oven" />
              Oven</label
            >
            <label
              ><input type="checkbox" name="appliances" value="microwave" />
              Microwave</label
            >
          </fieldset>

          <fieldset>
            <legend>Other Options</legend>
            <label
              ><input type="checkbox" name="windows" value="all" /> All
              Windows</label
            >
            <label
              ><input type="checkbox" name="baseboards" value="baseboards" />
              Baseboards</label
            >
            <label
              ><input type="checkbox" name="laundry" value="laundry" />
              Laundry</label
            >
          </fieldset>
        </div>

        <!-- Step 6: Date & Time -->
        <label for="appointmentDate">Date</label>
        <input type="date" id="appointmentDate" required />

        <label for="timeSlots">Available Time Slots</label>
        <select id="timeSlots" required></select>

        <!-- Step 7: Notes -->
        <label for="notes">Special Instructions</label>
        <textarea
          id="notes"
          placeholder="Any special instructions for your cleaner"
        ></textarea>

        <!-- Submit Request -->
        <button type="submit" class="btn-primary">
          Submit Booking Request
        </button>
      </form>

      <h2>Your Past Appointments</h2>
      <div id="appointmentHistory"></div>

      <script>
        const serviceSelect = document.getElementById("serviceSelect");
        const customOptions = document.getElementById("customOptions");

        // Load services dynamically
        async function loadServices() {
          const { data: services } = await supabase
            .from("services")
            .select("*");

          services.forEach((s) => {
            const option = document.createElement("option");
            option.value = s.name;
            option.textContent = s.name;
            serviceSelect.appendChild(option);
          });
        }

        // Show custom options only for Custom Cleaning
        serviceSelect.addEventListener("change", (e) => {
          if (e.target.value === "Custom Cleaning") {
            customOptions.style.display = "block";
          } else {
            customOptions.style.display = "none";
          }
        });

        loadServices();

        // Time slots logic and slot locking (reuse main.js functions)
      </script>
    </main>
  </body>
</html>
