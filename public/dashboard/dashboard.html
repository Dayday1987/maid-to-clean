<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your Maid To Clean customer dashboard - view upcoming bookings, past appointments, and manage your account." />
  <title>Dashboard | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Welcome Back</h1>
      <p id="welcomeName" style="color:var(--secondary);"></p>
    </div>

    <div class="grid grid-2">
      <div class="dashboard-card">
        <h3><i class="ph-duotone ph-calendar-check"></i> Upcoming Bookings</h3>
        <div id="upcomingBookings">
          <div class="empty-state">
            <i class="ph-duotone ph-calendar-blank"></i>
            <p>No upcoming bookings</p>
          </div>
        </div>
      </div>

      <div class="dashboard-card">
        <h3>Quick Actions</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem;">
          <a href="/dashboard/schedule.html" class="btn btn-primary">Schedule New Cleaning</a>
          <a href="/dashboard/payments.html" class="btn btn-secondary">View Payments</a>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    async function loadDashboard() {
      const user = await getCurrentUser();
      if (!user) return;

      const profile = await getUserProfile();
      if (profile) document.getElementById("welcomeName").textContent = `Hi ${profile.first_name || ''} 👋`;
    }

    document.addEventListener("DOMContentLoaded", loadDashboard);
  </script>
</body>
</html>
