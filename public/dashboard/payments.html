<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View your payments and booking history with Maid To Clean." />
  <title>Payments | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Payments & Invoices</h1>
      <p>Your booking history and payment status</p>
    </div>

    <div class="dashboard-card">
      <h3><i class="ph-duotone ph-receipt"></i> Your Bookings</h3>
      <div id="paymentsList">
        <div class="empty-state">
          <i class="ph-duotone ph-receipt-x"></i>
          <p>No payments yet</p>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    async function loadPayments() {
      const user = await getCurrentUser();
      if (!user) return;

      const { data: payments } = await supabase
        .from("appointments")
        .select("*, services(name)")
        .eq("user_id", user.id)
        .order("appointment_date", { ascending: false });

      // Render logic (your original style)
      // ...
    }

    // Real-time updates
    supabase.channel("payments-channel").on("postgres_changes", { event: "*", schema: "public", table: "appointments" }, () => {
      loadPayments();
      showToast("Payment status updated!", "success");
    }).subscribe();

    document.addEventListener("DOMContentLoaded", loadPayments);
  </script>
</body>
</html>
