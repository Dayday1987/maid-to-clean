  <link rel="stylesheet" href="/assets/css/main.css" />

      <h1>Payments &amp; Invoices</h1>
      <p id="welcomeMessage" style="color:var(--secondary);"></p>
    </div>

    <div class="dashboard-card">
      <h3><i class="ph-duotone ph-receipt"></i> Make a Payment</h3>
      <div class="payment-actions">

        <button class="btn btn-apple" id="payAppleBtn">Pay with Apple Pay</button>
      </div>
    </div>

    <div class="dashboard-card">
      <h3>Payment History</h3>
      <div id="paymentContainer" class="messages-container">
        <p>Loading payment history...</p>
      </div>
    </div>
