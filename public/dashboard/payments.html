<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Payments &amp; Invoices</h1>
      <p>Your booking history and payment status</p>
    </div>

    <div class="dashboard-card">
      <h3><i class="ph-duotone ph-receipt"></i> Your Bookings</h3>
      <div id="paymentsList">
        <div class="empty-state">
          <i class="ph-duotone ph-receipt-x"></i>
          <p>No payments yet</p>
        </div>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    function showToast(message, type = "info") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="ph-duotone ph-${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    async function loadPayments() {
      const user = await getCurrentUser();
      if (!user) return;

      const { data: payments, error } = await supabase
        .from("appointments")
        .select("*, services(name)")
        .eq("user_id", user.id)
        .order("appointment_date", { ascending: false });

      const container = document.getElementById("paymentsList");

      if (error || !payments || payments.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="ph-duotone ph-receipt-x"></i><p>No payments yet</p></div>`;
        return;
      }

      container.innerHTML = payments.map(p => `
        <div style="padding: 1.25rem; background: var(--background); border-radius: var(--radius-md); margin-bottom: 1rem; border-left: 4px solid ${p.status === 'paid' ? 'var(--success)' : p.status === 'approved' ? 'var(--accent)' : 'var(--border)'}">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <strong>${p.services?.name || "Cleaning Service"}</strong><br>
              <small>${new Date(p.appointment_date).toLocaleDateString("en-US", {month:"long", day:"numeric", year:"numeric"})} at ${p.appointment_time}</small>
            </div>
            <div style="text-align:right">
              <span class="status-badge ${p.status}">${p.status}</span>
              ${p.status === 'approved' ? `<button onclick="payNow('${p.id}')" class="btn btn-primary" style="margin-top:8px">Pay Now</button>` : ''}
            </div>
          </div>
        </div>
      `).join("");
    }

    // Real-time updates (Stripe webhook → UI)
    supabase
      .channel("payments-channel")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "appointments" },
        () => {
          loadPayments();
          showToast("Payment status updated! 🎉", "success");
        }
      )
      .subscribe();

    // Optional Pay Now button (calls your existing Stripe endpoint)
    window.payNow = async (appointmentId) => {
      try {
        const res = await fetch("/api/create-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ appointmentId })
        });
        const { url } = await res.json();
        if (url) window.location.href = url;
      } catch (err) {
        showToast("Could not start payment. Please try again.", "error");
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      loadPayments();
    });
  </script>
</body>
</html>
