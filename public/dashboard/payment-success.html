<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful | Maid To Clean</title>

    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/assets/js/api-config.js"></script>
    <script defer src="/assets/js/auth.js"></script>
    <script defer src="/assets/js/load-navbar.js"></script>
  </head>
  <body class="light-bg">
    <div id="navbar"></div>

    <main
      style="
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        padding-top: calc(80px + 2rem);
      "
    >
      <div style="text-align: center; max-width: 500px">
        <div
          style="
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
          "
        >
          <i
            class="ph-duotone ph-check-circle"
            style="font-size: 3rem; color: var(--success)"
          ></i>
        </div>

        <h1 style="margin-bottom: 1rem">Payment Successful!</h1>
        <p
          style="
            font-size: 1.125rem;
            color: var(--secondary);
            margin-bottom: 2rem;
          "
        >
          Thank you for your payment. Your cleaning service has been confirmed
          and you'll receive a confirmation email shortly.
        </p>

        <div
          style="
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
          "
        >
          <a
            href="/dashboard/dashboard.html"
            class="btn btn-primary"
            data-testid="back-to-dashboard-btn"
          >
            <i class="ph-duotone ph-house-line"></i>
            Back to Dashboard
          </a>
          <a
            href="/dashboard/payments.html"
            class="btn btn-secondary"
            data-testid="view-payments-btn"
          >
            <i class="ph-duotone ph-receipt"></i>
            View Payments
          </a>
        </div>
      </div>
    </main>
    <script src="/js/load-navbar.js"></script>
  </body>
</html>
