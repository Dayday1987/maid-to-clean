<!-- ==========================
     USER SETTINGS FORM
========================== -->
<div id="profileHeader">
  <h2 id="fullName"></h2>
</div>

<form id="settingsForm">
  <label>Email:</label>
  <input type="email" id="email" required />

  <label>Phone:</label>
  <input type="text" id="phone" placeholder="(123) 456-7890" />

  <label>Address:</label>
  <input type="text" id="address" />

  <button type="submit">Save Changes</button>
  <span id="saveStatus" style="margin-left: 10px"></span>
</form>

<script>
  // Helper to format phone number
  function formatPhoneNumber(value) {
    // Remove non-digits
    const digits = value.replace(/\D/g, "");
    const match = digits.match(/^(\d{0,3})(\d{0,3})(\d{0,4})$/);
    if (!match) return "";
    let formatted = "";
    if (match[1]) formatted = "(" + match[1];
    if (match[2]) formatted += ") " + match[2];
    if (match[3]) formatted += "-" + match[3];
    return formatted;
  }

  // Populate the form with current user data
  async function populateSettingsForm() {
    const userData = await getUserProfile();
    if (!userData) return;

    document.getElementById("fullName").textContent =
      userData.full_name || "Unnamed User";
    document.getElementById("email").value = userData.email || "";
    document.getElementById("phone").value = formatPhoneNumber(
      userData.phone || "",
    );
    document.getElementById("address").value = userData.address || "";
  }

  populateSettingsForm();

  // Real-time phone formatting
  document.getElementById("phone").addEventListener("input", (e) => {
    e.target.value = formatPhoneNumber(e.target.value);
  });

  // Handle form submission
  document
    .getElementById("settingsForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value.replace(/\D/g, ""); // store as digits
      const address = document.getElementById("address").value;

      const statusEl = document.getElementById("saveStatus");
      statusEl.textContent = "Saving...";

      try {
        const { data, error } = await supabase
          .from("users")
          .update({ email, phone, address })
          .eq("id", (await getCurrentUser()).id);

        if (error) throw error;
        statusEl.textContent = "Saved ✅";
        setTimeout(() => {
          statusEl.textContent = "";
        }, 3000);
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Failed to save ❌";
      }
    });
</script>
