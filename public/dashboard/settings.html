<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings | Maid To Clean</title>

    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/assets/js/api-config.js"></script>
    <script defer src="/assets/js/auth.js"></script>
    <script defer src="/assets/js/dashboard-protect.js"></script>
    <script defer src="/assets/js/load-navbar.js"></script>
  </head>
  <body class="light-bg">
    <div id="navbar"></div>

    <main class="dashboard-container">
      <div class="dashboard-header">
        <h1>Account Settings</h1>
        <p>Manage your profile and preferences</p>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem">
        <!-- Profile Settings -->
        <div class="dashboard-card">
          <h3><i class="ph-duotone ph-user"></i> Profile Information</h3>
          <form id="profileForm">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                placeholder="Jane"
                data-testid="profile-firstname-input"
              />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                placeholder="Doe"
                data-testid="profile-lastname-input"
              />
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                disabled
                data-testid="profile-email-input"
              />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input
                type="tel"
                id="phone"
                placeholder="(334) 123-4567"
                data-testid="profile-phone-input"
              />
            </div>
            <div class="form-group">
              <label for="address">Address</label>
              <textarea
                id="address"
                placeholder="Your service address"
                data-testid="profile-address-input"
              ></textarea>
            </div>
            <button
              type="submit"
              class="btn btn-primary"
              data-testid="save-profile-btn"
            >
              <i class="ph-duotone ph-floppy-disk"></i>
              Save Changes
            </button>
          </form>
        </div>

        <!-- Password & Security -->
        <div>
          <div class="dashboard-card mb-6">
            <h3><i class="ph-duotone ph-lock"></i> Change Password</h3>
            <form id="passwordForm">
              <div class="form-group">
                <label for="newPassword">New Password</label>
                <input
                  type="password"
                  id="newPassword"
                  placeholder="Enter new password"
                  minlength="6"
                  data-testid="new-password-input"
                />
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                  type="password"
                  id="confirmPassword"
                  placeholder="Confirm new password"
                  data-testid="confirm-password-input"
                />
              </div>
              <button
                type="submit"
                class="btn btn-secondary"
                data-testid="change-password-btn"
              >
                <i class="ph-duotone ph-key"></i>
                Update Password
              </button>
            </form>
          </div>

          <div class="dashboard-card mb-6">
            <h3><i class="ph-duotone ph-headset"></i> Support</h3>
            <p style="margin-bottom: 1rem; color: var(--secondary)">
              Need help? Get in touch with our support team.
            </p>
            <a
              href="/contact.html"
              class="btn btn-secondary w-full"
              data-testid="contact-support-btn"
            >
              <i class="ph-duotone ph-chat-circle-dots"></i>
              Contact Support
            </a>
          </div>

          <div class="dashboard-card" style="border-color: var(--error)">
            <h3 style="color: var(--error)">
              <i class="ph-duotone ph-warning"></i> Danger Zone
            </h3>
            <p style="margin-bottom: 1rem; color: var(--secondary)">
              Once you delete your account, there is no going back. Please be
              certain.
            </p>
            <button
              class="btn"
              style="background: rgba(239, 68, 68, 0.1); color: var(--error)"
              onclick="confirmDeleteAccount()"
              data-testid="delete-account-btn"
            >
              <i class="ph-duotone ph-trash"></i>
              Delete Account
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `
        <i class="ph-duotone ph-${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}"></i>
        <span>${message}</span>
      `;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const user = await getCurrentUser();
        if (!user) return;

        const profile = await getUserProfile();
        if (profile) {
          document.getElementById("firstName").value = profile.first_name || "";
          document.getElementById("lastName").value = profile.last_name || "";
          document.getElementById("email").value = profile.email || user.email;
          document.getElementById("phone").value = profile.phone || "";
          document.getElementById("address").value = profile.address || "";
        } else {
          document.getElementById("email").value = user.email;
        }
      });

      // Save profile
      document
        .getElementById("profileForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const user = await getCurrentUser();
          if (!user) return;

          const submitBtn = e.target.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading"></span> Saving...';

          try {
            const { error } = await supabase
              .from("users")
              .update({
                first_name: document.getElementById("firstName").value.trim(),
                last_name: document.getElementById("lastName").value.trim(),
                phone: document.getElementById("phone").value.trim(),
                address: document.getElementById("address").value.trim(),
              })
              .eq("id", user.id);

            if (error) throw error;

            showToast("Profile updated successfully!", "success");
          } catch (error) {
            console.error("Error updating profile:", error);
            showToast(error.message || "Failed to update profile", "error");
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              '<i class="ph-duotone ph-floppy-disk"></i> Save Changes';
          }
        });

      // Change password
      document
        .getElementById("passwordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          if (newPassword !== confirmPassword) {
            showToast("Passwords do not match", "error");
            return;
          }

          const submitBtn = e.target.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading"></span> Updating...';

          try {
            const { error } = await supabase.auth.updateUser({
              password: newPassword,
            });
            if (error) throw error;

            showToast("Password updated successfully!", "success");
            document.getElementById("passwordForm").reset();
          } catch (error) {
            console.error("Error updating password:", error);
            showToast(error.message || "Failed to update password", "error");
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              '<i class="ph-duotone ph-key"></i> Update Password';
          }
        });

      // Delete account
      async function confirmDeleteAccount() {
        const confirmed = confirm(
          "Are you sure you want to delete your account? This action cannot be undone.",
        );
        if (!confirmed) return;

        const user = await getCurrentUser();
        if (!user) return;

        try {
          await supabase.from("users").delete().eq("id", user.id);
          await supabase.auth.signOut();
          showToast("Account deleted. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "/index.html";
          }, 1500);
        } catch (error) {
          console.error("Error deleting account:", error);
          showToast(
            "Failed to delete account. Please contact support.",
            "error",
          );
        }
      }
    </script>

    <style>
      @media (max-width: 900px) {
        .dashboard-container > div[style*="grid-template-columns: 1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
    <script src="/js/load-navbar.js"></script>
  </body>
</html>
