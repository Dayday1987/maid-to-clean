<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Update your Maid To Clean account settings and profile information." />
  <title>Settings | Maid To Clean</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/js/api-config.js"></script>
  <script defer src="/assets/js/auth.js"></script>
  <script defer src="/assets/js/dashboard-protect.js"></script>
  <script defer src="/assets/js/load-navbar.js"></script>
</head>
<body class="light-bg">
  <div id="navbar"></div>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <h1>Account Settings</h1>
    </div>

    <div class="dashboard-card">
      <h3>Profile Information</h3>
      <form id="profileForm">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" />
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </main>

  <script>
    // Basic settings form (you can expand later)
    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      // Update user profile in Supabase
      alert("Settings saved successfully!");
    });
  </script>

  <script src="/assets/js/load-navbar.js"></script>
</body>
</html>
